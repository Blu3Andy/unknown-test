<!DOCTYPE html>
<html lang="de">
<link href="css/normalize.css" rel="stylesheet" type="text/css">
<link href="css/components.css" rel="stylesheet" type="text/css">
<link href="css/quins2024.css" rel="stylesheet" type="text/css">
<script type="text/javascript">!function(o,c){var n=c.documentElement,t=" w-mod-";n.className+=t+"js",("ontouchstart"in o||o.DocumentTouch&&c instanceof DocumentTouch)&&(n.className+=t+"touch")}(window,document);</script>
<link href="images/favicon.png" rel="shortcut icon" type="image/x-icon">
<link href="images/webclip.jpg" rel="apple-touch-icon">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Terminbuchung bei Quins</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: white;
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .container {
            background: rgb(232, 237, 242);
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
       
        
       
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }
        
        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .day-buttons {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-top: 10px;
        }
        
        .day-btn {
            padding: 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            background: white;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
        }
        
        .day-btn:hover {
            border-color: #667eea;
            background: #f5f7ff;
        }
        
        .day-btn.selected {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }
        
        .day-btn .day-name {
            font-weight: 600;
            font-size: 16px;
            margin-bottom: 4px;
        }
        
        .day-btn .day-date {
            font-size: 13px;
            opacity: 0.8;
        }
        
        .time-slots {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 10px;
        }
        
        .time-slot {
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
        }
        
        .time-slot:hover:not(.booked) {
            border-color: #667eea;
            background: #f5f7ff;
        }
        
        .time-slot.selected {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }
        
        .time-slot.booked {
            background: #f5f5f5;
            color: #999;
            cursor: not-allowed;
            text-decoration: line-through;
        }
        
        button[type="submit"] {
            width: 100%;
            padding: 15px;
            background: #657d98;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
            margin-top: 10px;
        }
        
        button[type="submit"]:hover {
            transform: translateY(-2px);
        }
        
        button[type="submit"]:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        
        .message {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }
        
        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .loading {
            text-align: center;
            color: #666;
            padding: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="uui-heading-medium">Event Terminbuchung</h1>
        <p class="uui-text-size-medium">Wählen Sie Ihren Wunschtermin</p>
        
        <div id="message" class="message"></div>
        
        <form id="bookingForm">
            <div class="uui-form-field-wrapper" style="padding-top: 15px;">
                <label class="uui-field-label" for="name">Name *</label>
                <input class="uui-form_input-2 w-input" type="text" id="name" required placeholder="Max Mustermann">
            </div>

            <div class="uui-form-field-wrapper" style="padding-top: 15px;">
                <label class="uui-field-label" for="name">Company *</label>
                <input class="uui-form_input-2 w-input" type="text" id="company" required placeholder="Your Company">
            </div>
            
            <div class="uui-form-field-wrapper" style="padding-top: 15px;">
                <label class="uui-field-label" for="email">E-Mail *</label>
                <input class="uui-form_input-2 w-input" type="email" id="email" required placeholder="max@beispiel.de">
            </div>
            
            <div class="uui-form-field-wrapper" style="padding-top: 15px;">
                <label class="uui-field-label" for="phone">Telefon</label>
                <input class="uui-form_input-2 w-input" type="tel" id="phone" placeholder="+49 123 456789">
            </div>
            
            <div class="uui-form-field-wrapper" style="padding-top: 15px;">
                <label>Event-Tag *</label>
                <div class="day-buttons">
                    <div class="day-btn" data-date="2025-11-18">
                        <div class="day-name">Dienstag</div>
                        <div class="day-date">18.11.2025</div>
                    </div>
                    <div class="day-btn" data-date="2025-11-19">
                        <div class="day-name">Mittwoch</div>
                        <div class="day-date">19.11.2025</div>
                    </div>
                    <div class="day-btn" data-date="2025-11-20">
                        <div class="day-name">Donnerstag</div>
                        <div class="day-date">20.11.2025</div>
                    </div>
                    <div class="day-btn" data-date="2025-11-21">
                        <div class="day-name">Freitag</div>
                        <div class="day-date">21.11.2025</div>
                    </div>
                </div>
            </div>
            
            <div class="uui-form-field-wrapper" style="padding-top: 15px;">
                <label>Uhrzeit * (verfügbare Slots)</label>
                <div class="time-slots" id="timeSlots">
                    <div class="loading">Lade verfügbare Zeiten...</div>
                </div>
            </div>
            <div class="uui-form-field-wrapper" style="padding-top: 15px;">
                <button class="uui-button-4 w-button" type="submit" id="submitBtn">Termin buchen</button>
            </div>
            
        </form>
    </div>

    <script>
        // WICHTIG: Ersetze diese URL mit deiner Google Apps Script URL
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzrkf0bm1BCNLDKjKtGFvIXtjjMZBnxj9wZYXKyDUuLWANAWl8Xt3ambCICjcuGee6K/exec';
        
        // Verfügbare Zeitslots (kann angepasst werden)
        const availableTimeSlots = [
            '09:30', '10:30', '11:30',
            '13:30', '14:30', '15:30',
            '16:30'
        ];
        
        let selectedDate = null;
        let selectedTime = null;
        let bookedSlots = [];
        
        // Lade gebuchte Slots beim Start
        async function loadBookedSlots() {
            try {
                console.log('Lade gebuchte Slots...');
                const response = await fetch(SCRIPT_URL);
                const data = await response.json();
                
                console.log('Empfangene Daten:', data);
                
                if (data.status === 'success') {
                    bookedSlots = data.bookedSlots || [];
                    console.log('Gebuchte Slots geladen:', bookedSlots);
                } else {
                    console.error('Fehler beim Laden:', data.message);
                }
            } catch (error) {
                console.error('Fehler beim Laden:', error);
            }
        }
        
        // Tag auswählen
        function selectDay(element, date) {
            document.querySelectorAll('.day-btn').forEach(btn => {
                btn.classList.remove('selected');
            });
            element.classList.add('selected');
            selectedDate = date;
            displayTimeSlots();
        }
        
        // Zeige verfügbare Zeitslots
        function displayTimeSlots() {
            const container = document.getElementById('timeSlots');
            
            if (!selectedDate) {
                container.innerHTML = '<div class="loading">Bitte wählen Sie zuerst einen Tag</div>';
                return;
            }
            
            container.innerHTML = '';
            
            availableTimeSlots.forEach(time => {
                const slot = document.createElement('div');
                slot.className = 'time-slot';
                slot.textContent = time;
                
                // Prüfe ob Slot bereits gebucht ist - WICHTIG: Vergleiche beide als Strings
                const isBooked = bookedSlots.some(booking => {
                    const dateMatch = booking.date === selectedDate;
                    const timeMatch = booking.time === time;
                    
                    console.log(`Vergleiche: ${booking.date} === ${selectedDate} (${dateMatch}) && ${booking.time} === ${time} (${timeMatch})`);
                    
                    return dateMatch && timeMatch;
                });
                
                console.log(`Slot ${selectedDate} ${time}: ${isBooked ? 'GEBUCHT' : 'verfügbar'}`);
                
                if (isBooked) {
                    slot.classList.add('booked');
                } else {
                    slot.addEventListener('click', () => selectTimeSlot(slot, time));
                }
                
                container.appendChild(slot);
            });
        }
        
        // Zeitslot auswählen
        function selectTimeSlot(element, time) {
            document.querySelectorAll('.time-slot').forEach(slot => {
                slot.classList.remove('selected');
            });
            element.classList.add('selected');
            selectedTime = time;
        }
        
        // Nachricht anzeigen
        function showMessage(text, type) {
            const messageEl = document.getElementById('message');
            messageEl.textContent = text;
            messageEl.className = `message ${type}`;
            messageEl.style.display = 'block';
            
            setTimeout(() => {
                messageEl.style.display = 'none';
            }, 5000);
        }
        
        // Event Listener für Tag-Buttons
        document.querySelectorAll('.day-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                selectDay(this, this.dataset.date);
            });
        });
        
        // Formular absenden
        document.getElementById('bookingForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            if (!selectedDate) {
                showMessage('Bitte wählen Sie einen Tag', 'error');
                return;
            }
            
            if (!selectedTime) {
                showMessage('Bitte wählen Sie eine Uhrzeit', 'error');
                return;
            }
            
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Wird gesendet...';
            
            const formData = {
                name: document.getElementById('name').value,
                company: document.getElementById('company').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                date: selectedDate,
                time: selectedTime
            };
            
            console.log('Sende Buchung:', formData);
            
            try {
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify(formData)
                });
                
                const data = await response.json();
                console.log('Antwort vom Server:', data);
                
                if (data.status === 'success') {
                    showMessage('Buchung erfolgreich! Sie erhalten eine Bestätigung per E-Mail.', 'success');
                    document.getElementById('bookingForm').reset();
                    
                    // Reset selections
                    document.querySelectorAll('.day-btn').forEach(btn => {
                        btn.classList.remove('selected');
                    });
                    selectedDate = null;
                    selectedTime = null;
                    
                    // Aktualisiere die gebuchten Slots
                    await loadBookedSlots();
                    displayTimeSlots();
                } else {
                    showMessage(data.message || 'Fehler bei der Buchung', 'error');
                }
            } catch (error) {
                showMessage('Verbindungsfehler. Bitte versuchen Sie es erneut.', 'error');
                console.error('Error:', error);
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Termin buchen';
            }
        });
        
        // Initialisierung
        loadBookedSlots().then(() => {
            console.log('Initiale Slots geladen, warte auf Tag-Auswahl...');
        });
    </script>
</body>
</html>
